# ──────────────────────────────────────────────────────────
# SonarQube / SonarCloud project configuration
# Run: npm run sonar  (requires SONAR_TOKEN env var)
# ──────────────────────────────────────────────────────────

sonar.projectKey=react-testgen
sonar.projectName=React Test Generator
sonar.projectVersion=1.0.0

# ── Sources ────────────────────────────────────────────────
sonar.sources=packages/testgen/src,examples/expense-manager/src

# ── Tests ──────────────────────────────────────────────────
sonar.tests=examples/expense-manager/src
sonar.test.inclusions=**/__tests__/**/*.{ts,tsx},**/*.test.{ts,tsx},**/*.spec.{ts,tsx}

# ── Exclusions ─────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/test-utils/**,\
  **/types/**,\
  **/__mocks__/**,\
  **/scripts/**,\
  **/examples/expense-manager/public/**

sonar.coverage.exclusions=\
  **/src/index.tsx,\
  **/types/**,\
  **/test-utils/**,\
  **/__tests__/**,\
  **/__mocks__/**,\
  **/examples/expense-manager/src/main.tsx

# ── Coverage reports ───────────────────────────────────────
# Generated by: npm run test:coverage  (inside expense-manager)
sonar.javascript.lcov.reportPaths=examples/expense-manager/coverage/lcov.info

# ── TypeScript ─────────────────────────────────────────────
sonar.typescript.tsconfigPaths=\
  packages/testgen/tsconfig.json,\
  examples/expense-manager/tsconfig.json

# ── Language ───────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Duplicate-code thresholds ──────────────────────────────
sonar.cpd.exclusions=\
  **/__tests__/**,\
  **/test-utils/**

# ── Server (override via env var SONAR_HOST_URL) ──────────
# sonar.host.url=http://localhost:9000
